<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet App</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

.container {
  display: flex;
  width: 400vw;
  height: 100vh;
  transition: transform 0.4s ease;
}

.page {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  padding: 20px;
  box-sizing: border-box;
}

.p1 { background: #f5e6d6; }
.p2 { background: #ffe0cc; }
.p3 { background: #e6f2ff; }
.p4 { background: #fff0e6; }

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
}

.btn {
  background: orange;
  color: white;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container" id="slider">

  <!-- 頁面1 -->
  <div class="page p1">
    <h1>今日反思</h1>
    <div class="card">
      今天你為寵物做了什麼讓牠快樂？<br><br>
      🐾 散步 🐾 陪玩 🐾 擁抱
      <br><br>
      <input style="width:100%;padding:10px;" placeholder="寫下你的想法...">
      <div class="btn">儲存情緒</div>
    </div>
  </div>

  <!-- 頁面2 -->
  <div class="page p2">
    <h1>拍照任務</h1>
    <div class="card">
      捕捉牠最放鬆的瞬間 📸<br><br>
      任務進度：3/5
      <div class="btn">拍照 +50</div>
    </div>
  </div>

  <!-- 頁面3 -->
  <div class="page p3">
    <h1>附近寵物</h1>
    <div class="card">
      🐶 Mocha - 200m<br>
      🐱 Mimi - 150m
      <div class="btn">打招呼</div>
    </div>
  </div>

  <!-- 頁面4 -->
  <div class="page p4">
    <h1>附近店家</h1>
    <div class="card">
      ☕ 寵物咖啡 250m ⭐4.8<br>
      🏥 獸醫院 300m ⭐4.9<br>
      🛍️ 寵物店 180m ⭐4.5
    </div>
  </div>

</div>
<script>
let current = 0;
let startX = 0;
let moveX = 0;
let isDragging = false;

const slider = document.getElementById("slider");

// 開始拖
document.addEventListener("mousedown", e => {
  startX = e.clientX;
  isDragging = true;
});

document.addEventListener("mousemove", e => {
  if (!isDragging) return;
  moveX = e.clientX;
  let diff = startX - moveX;

  slider.style.transition = "none";
  slider.style.transform = `translateX(${-current * window.innerWidth - diff}px)`;
});

document.addEventListener("mouseup", e => {
  if (!isDragging) return;
  isDragging = false;

  let diff = startX - e.clientX;

  if (diff > 50 && current < 3) current++;
  if (diff < -50 && current > 0) current--;

  slider.style.transition = "transform 0.3s ease";
  slider.style.transform = `translateX(-${current * 100}vw)`;
});

// 手機
document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchmove", e => {
  let diff = startX - e.touches[0].clientX;

  slider.style.transition = "none";
  slider.style.transform = `translateX(${-current * window.innerWidth - diff}px)`;
});

document.addEventListener("touchend", e => {
  let diff = startX - e.changedTouches[0].clientX;

  if (diff > 50 && current < 3) current++;
  if (diff < -50 && current > 0) current--;

  slider.style.transition = "transform 0.3s ease";
  slider.style.transform = `translateX(-${current * 100}vw)`;
});
</script>


</body>
</html>
